services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qualitara
      POSTGRES_PASSWORD: qualitara
      POSTGRES_DB: qualitara
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualitara -d qualitara"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://qualitara:qualitara@postgres:5432/qualitara
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres-data:
